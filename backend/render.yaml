# Render blueprint — `https://render.com/docs/blueprint-spec`
#
# Deploys the NestJS API as a free-tier web service. Import this repo on
# Render via "New → Blueprint" and Render reads this file to create the
# service automatically. You only fill in the secrets in the dashboard
# (see the `sync: false` fields below).
#
# Runtime notes:
# - Render injects its own `PORT` env var; main.ts already honours it.
# - The free plan sleeps after 15 min of inactivity. First request after
#   idle takes ~30–60 s while the container cold-starts. Fine for a case
#   demo, upgrade to `starter` ($7/mo) if that's unacceptable.
# - `healthCheckPath` disables Render's "no response" restart loop.
services:
  - type: web
    name: estate-agency-api
    runtime: node
    plan: free
    region: frankfurt
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      # Secrets: fill these in from the Render dashboard after the first
      # deploy. `sync: false` makes Render prompt for a value instead of
      # committing one to git.
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      # Non-secret overrides with sane defaults.
      - key: JWT_EXPIRES_IN
        value: 12h
      # Production Vercel URL is enough — same-project preview deploys
      # (`*-git-*-*.vercel.app`) are accepted automatically. Custom domains
      # must still be listed explicitly if used.
      - key: FRONTEND_ORIGIN
        sync: false
