# Optional: deploy the Nuxt app through GitHub Actions instead of (or in addition to)
# Vercel's built-in "Import Git Repository" flow.
#
# Recommended: In Vercel → Project → Settings → Git, connect this repo and set
# Root Directory to `frontend`. Then every push to your Production Branch
# redeploys automatically — no workflow needed.
#
# Enable this workflow only if you want Actions-based deploys:
#   GitHub repo → Settings → Variables → New repository variable:
#     Name: VERCEL_ACTIONS_DEPLOY   Value: true
#   GitHub repo → Settings → Secrets and variables → Actions → New repository secret:
#     VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
#   (Values from Vercel → Project → Settings → General, and a token from
#   Vercel → Account Settings → Tokens.)
#
# If Vercel Git deploys are already on, do not enable this or you will get
# two production deploys per push.
name: Deploy frontend (Vercel)

on:
  push:
    branches: [main, master]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-vercel.yml'
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    if: vars.VERCEL_ACTIONS_DEPLOY == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy prebuilt
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
